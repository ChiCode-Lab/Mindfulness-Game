<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shape</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const shapeType = urlParams.get('shape') || 'pebble';
        const isTarget = urlParams.get('target') === 'true';

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 4;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.2);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // Custom Shader Material for translucent glass with swirls
        const vertexShader = `
            varying vec3 vNormal;
            varying vec3 vPositionNormal;
            varying vec2 vUv;
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                vPositionNormal = normalize((modelViewMatrix * vec4(position, 1.0)).xyz);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float time;
            uniform vec3 color1;
            uniform vec3 color2;
            uniform vec3 color3;
            uniform float targetGlow;
            
            varying vec3 vNormal;
            varying vec3 vPositionNormal;
            varying vec2 vUv;
            
            // Simplex noise function approximation
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
            float snoise(vec2 v) {
                const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
                vec2 i  = floor(v + dot(v, C.yy) );
                vec2 x0 = v -   i + dot(i, C.xx);
                vec2 i1;
                i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec4 x12 = x0.xyxy + C.xxzz;
                x12.xy -= i1;
                i = mod289(i);
                vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
                vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                m = m*m; m = m*m;
                vec3 x = 2.0 * fract(p * C.www) - 1.0;
                vec3 h = abs(x) - 0.5;
                vec3 ox = floor(x + 0.5);
                vec3 a0 = x - ox;
                m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                vec3 g;
                g.x  = a0.x  * x0.x  + h.x  * x0.y;
                g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                return 130.0 * dot(m, g);
            }

            void main() {
                // Fresnel (rim lighting) for glass effect
                float fresnel = dot(vNormal, vPositionNormal);
                fresnel = clamp(1.0 + fresnel, 0.0, 1.0);
                fresnel = pow(fresnel, 3.0);
                
                // Noise for swirls
                float n1 = snoise(vUv * 3.0 + time * 0.5);
                float n2 = snoise(vUv * 5.0 - time * 0.3);
                
                // Mix colors
                vec3 color = mix(color1, color2, n1 * 0.5 + 0.5);
                color = mix(color, color3, n2 * 0.5 + 0.5);
                
                // Add glass reflection
                vec3 finalColor = color + vec3(fresnel) * 0.8;
                
                // Add target glow if it's the target
                if (targetGlow > 0.0) {
                    finalColor += vec3(1.0, 0.5, 0.3) * fresnel * targetGlow;
                }
                
                gl_FragColor = vec4(finalColor, 0.8 + fresnel * 0.2);
            }
        `;

        const uniforms = {
            time: { value: 0.0 },
            color1: { value: new THREE.Color(0xFF1493) }, // Deep pink
            color2: { value: new THREE.Color(0xFF4500) }, // Vibrant orange
            color3: { value: new THREE.Color(0x8A2BE2) }, // Purple
            targetGlow: { value: isTarget ? 1.0 : 0.0 }
        };

        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            side: THREE.DoubleSide
        });

        // Geometry based on shape type
        let geometry;
        if (shapeType === 'pebble') {
            geometry = new THREE.SphereGeometry(1, 32, 32);
            // Deform sphere to look like a pebble
            const positions = geometry.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                positions.setY(i, positions.getY(i) * 0.7); // Flatten a bit
                positions.setZ(i, positions.getZ(i) * 0.9);
            }
            geometry.computeVertexNormals();
        } else if (shapeType === 'leaf') {
            geometry = new THREE.CylinderGeometry(0, 1, 2, 4, 1, false);
            const positions = geometry.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                positions.setZ(i, positions.getZ(i) * 0.2); // Flatten into leaf
            }
            geometry.computeVertexNormals();
        } else if (shapeType === 'tree') {
            geometry = new THREE.ConeGeometry(1, 2, 8);
        } else {
            geometry = new THREE.SphereGeometry(1, 32, 32);
        }

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // Add soft outer glow if it's the target shape
        if (isTarget) {
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xFF8A66,
                transparent: true,
                opacity: 0.3,
                side: THREE.BackSide
            });
            const glowMesh = new THREE.Mesh(geometry.clone(), glowMaterial);
            glowMesh.scale.multiplyScalar(1.2);
            scene.add(glowMesh);
        }

        // Animation loop
        function animate(time) {
            requestAnimationFrame(animate);
            
            // Rotation
            mesh.rotation.x += 0.005;
            mesh.rotation.y += 0.01;

            if (isTarget) {
                scene.children.forEach(child => {
                    if (child !== ambientLight && child !== pointLight && child !== mesh) {
                        child.rotation.x += 0.005;
                        child.rotation.y += 0.01;
                    }
                });
            }
            
            // Update uniforms
            uniforms.time.value = time * 0.001;
            
            renderer.render(scene, camera);
        }
        
        animate(0);

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
