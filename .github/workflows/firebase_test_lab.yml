name: Build & Test on Firebase Test Lab

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build APK & Run Firebase Robo Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java (required by Android Gradle) ─────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Set up Flutter ────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Install dependencies ──────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: mindfulness_app
        run: flutter pub get

      # ── 5. Run unit tests ────────────────────────────────────────────────────
      - name: Run unit tests
        working-directory: mindfulness_app
        run: flutter test
        continue-on-error: true   # Don't block the build if tests fail

      # ── 6. Build debug APK ───────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: mindfulness_app
        run: flutter build apk --debug --no-tree-shake-icons

      # ── 7. Upload APK as artifact (so you can download it directly too) ──────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindaware-debug-apk
          path: mindfulness_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # ── 8. Authenticate to Google Cloud ─────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # ── 9. Set up gcloud CLI ─────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 10. Upload to Firebase Test Lab & run Robo test ─────────────────────
      - name: Run Firebase Robo Test
        run: |
          gcloud firebase test android run \
            --type robo \
            --app mindfulness_app/build/app/outputs/flutter-apk/app-debug.apk \
            --device model=Pixel6,version=33,locale=en,orientation=portrait \
            --device model=SamsungS22,version=32,locale=en,orientation=portrait \
            --timeout 3m \
            --project mindaware-5d498 \
            --robo-directives ignore:fab=,ignore:bottom_nav=
